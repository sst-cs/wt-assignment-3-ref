name: Autograde React Hooks

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      statuses: write
      checks: write

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the late-penalty can read the student's last code-commit date

      - name: Checkout hidden tests
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: sst-cs/wt-assignment-3-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Verify hidden tests available
        run: |
          if [ ! -f hidden-tests/test.js ]; then
            echo "::error title=Hidden tests missing::Could not fetch the hidden tests. The HIDDEN_TESTS_TOKEN org secret is missing or invalid (GitHub returns 'Bad credentials' when a token is expired/revoked). An org admin must update HIDDEN_TESTS_TOKEN and re-run. NOTE: template/-ref repos are expected to fail here."
            exit 1
          fi
          echo "Hidden tests present — proceeding."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run static analysis grader
        id: run_tests
        run: |
          node hidden-tests/test.js | tee /tmp/test_output.txt
          SCORE=$(sed -n 's/.*Final Score: \([0-9]\{1,2\}\)\/.*/\1/p' /tmp/test_output.txt | head -1)
          [ -z "$SCORE" ] && SCORE=0
          echo "Extracted score: $SCORE"
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      - name: Package Results
        id: package
        run: |
          TOTAL=${SCORE:-0}
          echo "Total Score: $TOTAL / 10"

          # ── Late-submission penalty (Assignment 3) ──────────────────────────
          #   on time  (<= 2026-06-07 11:59 PM PKT = 18:59 UTC) → full marks
          #   1-7 days late                                     → -40% flat (x0.6)
          #   > 7 days late (after 2026-06-14 11:59 PM PKT)     → zero credit
          DEADLINE_EPOCH=$(date -d "2026-06-07T18:59:00Z" +%s)
          ZERO_EPOCH=$(date -d "2026-06-14T18:59:00Z" +%s)
          LAST_CODE_ISO=$(git log --format="%cI" -- . ':(exclude).github/' 2>/dev/null | head -1)
          [ -z "$LAST_CODE_ISO" ] && LAST_CODE_ISO=$(git log -1 --format=%cI)
          LAST_CODE_EPOCH=$(date -d "$LAST_CODE_ISO" +%s 2>/dev/null || echo 0)
          if [ "$LAST_CODE_EPOCH" -gt "$ZERO_EPOCH" ]; then
            echo "VERY LATE >7 days (last code commit: $LAST_CODE_ISO) — zero credit"
            TOTAL=0
          elif [ "$LAST_CODE_EPOCH" -gt "$DEADLINE_EPOCH" ]; then
            echo "LATE 1-7 days (last code commit: $LAST_CODE_ISO) — applying -40% flat penalty"
            TOTAL=$(( TOTAL * 6 / 10 ))
            echo "Score after penalty: $TOTAL / 10"
          else
            echo "ON TIME (last code commit: $LAST_CODE_ISO) — no penalty"
          fi

          for i in $(seq 1 10); do
            STATUS="fail"; SCORE_VAL=0
            if [ $i -le $TOTAL ]; then STATUS="pass"; SCORE_VAL=1; fi
            JSON="{\"version\":1,\"status\":\"$STATUS\",\"max_score\":1,\"tests\":[{\"name\":\"Requirement $i\",\"status\":\"$STATUS\",\"score\":$SCORE_VAL,\"max_score\":1}]}"
            B64=$(echo -n "$JSON" | base64 -w 0)
            echo "R${i}_RESULTS=$B64" >> $GITHUB_ENV
          done

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        continue-on-error: true
        with:
          runners: r1,r2,r3,r4,r5,r6,r7,r8,r9,r10
